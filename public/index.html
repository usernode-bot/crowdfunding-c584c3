    .progress-bar { transition: width 0.4s ease; background: linear-gradient(90deg, #7c3aed, #6366f1); }
    .badge-active    { background:#16a34a22; color:#4ade80; border:1px solid #16a34a55; }
    .badge-funded    { background:#7c3aed22; color:#a78bfa; border:1px solid #7c3aed55; }
    .badge-withdrawn { background:#0d948822; color:#2dd4bf; border:1px solid #0d948855; }
    .badge-expired   { background:#52525222; color:#a1a1aa; border:1px solid #52525255; }
    .badge-refunded  { background:#0ea5e922; color:#38bdf8; border:1px solid #0ea5e955; }
    .badge-confirmed { background:#16a34a22; color:#4ade80; border:1px solid #16a34a55; }
    .badge-pending   { background:#ca8a0422; color:#facc15; border:1px solid #ca8a0455; }
    .badge-failed    { background:#dc262622; color:#f87171; border:1px solid #dc262655; }
    .nav-menu {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    @media (max-width: 767px) {
      .nav-menu {
        display: none;
      }
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      color: #a1a1aa;
      text-decoration: none;
      transition: color 0.15s, background-color 0.15s;
      position: relative;
      white-space: nowrap;
    }
    .nav-link:hover {
      color: #f4f4f5;
      background-color: #27272a;
    }
    .nav-link.active {
      background-color: #27272a;
      color: #f4f4f5;
    }
    .nav-label {
      display: inline;
    }
    @media (max-width: 767px) {
      .nav-label {
        display: none;
      }
    }
    .nav-hamburger {
      display: none;
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      padding: 0;
      border: none;
      background: none;
      color: #a1a1aa;
      cursor: pointer;
      font-size: 1.25rem;
      transition: color 0.15s;
      align-items: center;
      justify-content: center;
    }
    .nav-hamburger:hover {
      color: #f4f4f5;
    }
    @media (max-width: 767px) {
      .nav-hamburger {
        display: flex;
      }
    }
    .nav-menu-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #18181b;
      border: 1px solid #27272a;
      border-top: none;
      border-radius: 0 0 0.75rem 0.75rem;
      flex-direction: column;
      gap: 0;
      min-width: 180px;
      z-index: 40;
    }
    .nav-menu-dropdown.active {
      display: flex;
    }
    .nav-menu-dropdown .nav-link {
      width: 100%;
      border-radius: 0;
      padding: 0.5rem 1rem;
      justify-content: flex-start;
    }
    .nav-menu-dropdown .nav-link:last-child {
      border-radius: 0 0 0.5rem 0.5rem;
    }
    .nav-menu-dropdown .nav-label {
      display: inline;
    }
    :root {
      --bg-page:      #f4f4f5;
      --bg-card:      #ffffff;
      --bg-input:     #e4e4e7;
      --border:       #d4d4d8;
      --text-primary: #18181b;
      --text-muted:   #52525b;
      --text-subtle:  #71717a;
    }
    html.dark {
      --bg-page:      #09090b;
      --bg-card:      #18181b;
      --bg-input:     #27272a;

      --text-primary: #f4f4f5;
      --text-muted:   #a1a1aa;
      --text-subtle:  #71717a;

    html:not(.dark) .bg-zinc-900     { background-color: var(--bg-card) !important; }
    html:not(.dark) .bg-zinc-800     { background-color: var(--bg-input) !important; }
    html:not(.dark) .border-zinc-800 { border-color: var(--border) !important; }

    html:not(.dark) .text-zinc-100   { color: var(--text-primary) !important; }
    html:not(.dark) .text-zinc-300   { color: var(--text-muted) !important; }
    html:not(.dark) .text-zinc-400   { color: var(--text-muted) !important; }
    html:not(.dark) .text-zinc-500   { color: var(--text-subtle) !important; }
    html:not(.dark) .text-zinc-600   { color: var(--text-subtle) !important; }
    html:not(.dark) .badge-active    { background:#dcfce7; color:#15803d; border:1px solid #86efac; }
    html:not(.dark) .badge-funded    { background:#ede9fe; color:#7c3aed; border:1px solid #c4b5fd; }
    html:not(.dark) .badge-withdrawn { background:#ccfbf1; color:#0f766e; border:1px solid #99f6e4; }
    html:not(.dark) .badge-expired   { background:#f4f4f5; color:#52525b; border:1px solid #d4d4d8; }
    html:not(.dark) .badge-refunded  { background:#e0f2fe; color:#0369a1; border:1px solid #bae6fd; }
    html:not(.dark) .badge-confirmed { background:#dcfce7; color:#15803d; border:1px solid #86efac; }
    html:not(.dark) .badge-pending   { background:#fefce8; color:#b45309; border:1px solid #fde047; }
    html:not(.dark) .badge-failed    { background:#fee2e2; color:#dc2626; border:1px solid #fca5a5; }
    html.dark  #theme-sun  { display:block;  }
    html.dark  #theme-moon { display:none;   }
    html:not(.dark) #theme-sun  { display:none;  }
    html:not(.dark) #theme-moon { display:block; }
    html:not(.dark) .nav-link { color: var(--text-muted); }
    html:not(.dark) .nav-link:hover { color: var(--text-primary); background-color: var(--bg-input); }
    html:not(.dark) .nav-link.active { background-color: var(--bg-input); color: var(--text-primary); }
    html:not(.dark) .nav-hamburger { color: var(--text-muted); }
    html:not(.dark) .nav-hamburger:hover { color: var(--text-primary); }
    html:not(.dark) .nav-menu-dropdown { background-color: var(--bg-card); border-color: var(--border); }
    html:not(.dark) .nav-menu-dropdown .nav-link { color: var(--text-muted); }
    html:not(.dark) .nav-menu-dropdown .nav-link:hover { color: var(--text-primary); background-color: var(--bg-input); }
    html:not(.dark) .progress-bar { background: linear-gradient(90deg, #a78bfa, #c084fc); }
    html:not(.dark) .emoji-chip { border-color: var(--border); }
    html:not(.dark) .emoji-chip:hover { background: var(--bg-input); border-color: var(--text-muted); }
    html:not(.dark) .campaign-card:hover { box-shadow: 0 0 0 1px rgba(168, 85, 247, 0.27), 0 4px 24px rgba(168, 85, 247, 0.13); }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-weight: 600;
      color: #f4f4f5;
      text-decoration: none;
      font-size: 0.9375rem;
      white-space: nowrap;

    }
    .nav-logo:hover { color: #ffffff; }
    html:not(.dark) .nav-logo { color: #18181b; }
    html:not(.dark) .nav-logo:hover { color: #09090b; }
    #theme-toggle, #profile-icon-btn, #connect-wallet-btn {
      color: #a1a1aa;
    }
    #theme-toggle:hover, #profile-icon-btn:hover, #connect-wallet-btn:hover {
      color: #f4f4f5;
      background-color: #27272a;
    }
    html:not(.dark) #theme-toggle, html:not(.dark) #profile-icon-btn, html:not(.dark) #connect-wallet-btn {
      color: var(--text-muted);
    }
    html:not(.dark) #theme-toggle:hover, html:not(.dark) #profile-icon-btn:hover, html:not(.dark) #connect-wallet-btn:hover {
      color: var(--text-primary);
      background-color: var(--bg-input);
    }
    .nav-glass {
      background-color: rgba(9,9,11,0.88) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    html:not(.dark) .nav-glass {
      background-color: rgba(255,255,255,0.88) !important;
    }
    .stat-box {
      background: #27272a;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
    }
    html:not(.dark) .stat-box { background: #e4e4e7; }
    .emoji-chip {
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 0.5rem;
      background: transparent;
      border: 1px solid #3f3f46;
      font-size: 1rem;
      line-height: 1.5;
      transition: background-color 0.15s, border-color 0.15s;

    html:not(.dark) .emoji-chip { border-color: #d4d4d8; }
    html:not(.dark) .emoji-chip:hover { background: #e4e4e7; border-color: #a1a1aa; }
    .campaign-card { transition: border-color 0.15s, box-shadow 0.2s; }
    .campaign-card:hover { box-shadow: 0 0 0 1px rgba(124,58,237,0.27), 0 4px 24px rgba(124,58,237,0.13); }

            <div id="wd-username" class="font-medium text-sm mb-1 truncate"></div>
            <div id="wd-address" class="font-mono text-xs text-zinc-400 break-all mb-3"></div>
            <div class="flex gap-2">
              <button id="wd-copy-btn" class="flex-1 px-2 py-1 text-xs bg-zinc-800 hover:bg-zinc-700 rounded transition-colors">Copy address</button>
              <a href="#/profile" id="wd-profile-link" class="flex-1 px-2 py-1 text-xs text-center bg-violet-600/20 hover:bg-violet-600/30 text-violet-400 rounded transition-colors">My Profile →</a>
            </div>
          </div>
        </div>
        <span id="staging-pill" class="hidden px-2 py-0.5 rounded text-xs bg-amber-500/20 text-amber-400 border border-amber-500/30">Staging</span>
      </div>
    </div>
  </nav>
  <div id="view" class="flex-1 overflow-y-auto max-w-5xl mx-auto w-full px-4 py-8"></div>
</div>

<script>
(function() {
  'use strict';

  // ── API helper ───────────────────────────────────────────────────────────────

  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '';
  const hdrs = () => {
    const h = { 'Content-Type': 'application/json' };
    if (token) h['x-usernode-token'] = token;
    return h;
  };

  async function api(method, path, body) {
    const opts = { method, headers: hdrs() };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.statusText);
    return data;
  }

  // ── State cache ──────────────────────────────────────────────────────────────

  let cachedState = null;
  let lastStateFetch = 0;

  // Client-tracked pending campaign creations (broadcast but not yet confirmed by poller)
  // Map<campaignId, { id, title, description, emoji, goal, deadline, creator_address, txid, ts }>
  const pendingCampaigns = new Map();

  async function loadState(force) {
    const now = Date.now();
    if (!force && cachedState && now - lastStateFetch < 3000) return cachedState;
    const data = await api('GET', '/api/state');
    // Auto-expire confirmed pending campaigns and inject remaining ones
    if (pendingCampaigns.size > 0) {
      const confirmedIds = new Set(data.campaigns.map(c => c.id));
      for (const id of pendingCampaigns.keys()) {
        if (confirmedIds.has(id)) pendingCampaigns.delete(id);
      }
      if (pendingCampaigns.size > 0) {
        const injected = [...pendingCampaigns.values()].map(p => ({
          ...p,
          total_raised: 0,
          backer_count: 0,
          status: 'pending',
        }));
        data.campaigns = [...injected, ...data.campaigns];
      }
    }
    cachedState = data;
    lastStateFetch = Date.now();
    return data;
  }

  function invalidateState() {
    cachedState = null;
    lastStateFetch = 0;
  }

  // Client-tracked pending transactions (sent but not yet confirmed by poller)
  // Map<txid, { type, campaign_id, campaign_title, amount, ts }>
  const pendingTxs = new Map();

  // ── Formatting helpers ───────────────────────────────────────────────────────

  function fmt(amount) {
    return Number(amount).toLocaleString();
  }

  function timeLeft(deadline) {
    const ms = new Date(deadline) - Date.now();
    if (ms <= 0) return 'Ended';
    const d = Math.floor(ms / 86400000);
    const h = Math.floor((ms % 86400000) / 3600000);
    if (d > 0) return d + 'd ' + h + 'h left';
    return h + 'h left';
  }

  function pct(raised, goal) {
    if (!goal || goal === 0) return 0;
    return Math.min(100, Math.round(Number(raised) / Number(goal) * 100));
  }

  function badge(status) {
    const labels = {
      active: 'Active', funded: 'Funded 🎉', withdrawn: 'Withdrawn',
      expired: 'Ended', refunded: 'Refunded',
      confirmed: 'Confirmed', pending: 'Pending', failed: 'Failed',
    };
    return `<span class="badge-${status} px-2 py-0.5 rounded-full text-xs font-medium">${labels[status] || status}</span>`;
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Detect the structured {error:'Explorer proxy error', detail} JSON the server
  // proxy embeds in bridge error messages. Returns null when it's not one.
  function explorerProxyError(err) {
    const msg = (err && err.message) || String(err);
    const braceIdx = msg.indexOf('{');
    if (braceIdx === -1) return null;
    try {
      const parsed = JSON.parse(msg.slice(braceIdx));
      if (parsed && parsed.error === 'Explorer proxy error') {
        return { detail: parsed.detail || '' };
      }
    } catch (_) {}
    return null;
  }

  // True when the failure is the explorer/confirmation relay being unreachable —
  // i.e. the transaction was very likely already broadcast and only the
  // post-send inclusion poll failed. Callers use this to show a soft "pending"
  // state instead of a hard red failure.
  function isExplorerProxyError(err) {
    return explorerProxyError(err) !== null;
  }

  function friendlyError(err) {
    const proxy = explorerProxyError(err);
    if (proxy) {
      const detail = proxy.detail;
      if (/ECONNREFUSED|ENOTFOUND|ETIMEDOUT|ECONNRESET|fetch failed/i.test(detail)) {
        return 'Could not reach the blockchain explorer. The network may be temporarily unavailable — please try again.';
      }
      return 'Blockchain explorer is unreachable' + (detail ? ' (' + detail + ')' : '') + '. Please try again.';
    }
    return (err && err.message) || String(err);
  }

  function getDisplayName(pubkey, fallback) {
    if (!pubkey) return fallback || '—';
    if (window.UsernodeUsernames) {
      const all = UsernodeUsernames.getAllUsernamesSync();
      if (all[pubkey]) return all[pubkey];
    }
    if (fallback) return fallback;
    return pubkey.slice(0, 6) + '…' + pubkey.slice(-4);
  }

  function importUsernames(items, pubkeyField, nameField) {
    if (!window.UsernodeUsernames || !Array.isArray(items)) return;
    const map = {};
    items.forEach(item => {
      if (item && item[pubkeyField] && item[nameField]) map[item[pubkeyField]] = item[nameField];
    });
    UsernodeUsernames.importLegacy(map);
  }

  // ── Wallet bridge ────────────────────────────────────────────────────────────

  async function waitForBridge(ms) {
    ms = ms || 5000;
    const start = Date.now();
    while (!window.usernode) {
      if (Date.now() - start > ms) throw new Error('Wallet bridge failed to load. Please refresh.');
      await new Promise(r => setTimeout(r, 50));
    }
    return window.usernode;
  }

  function generateCampaignId() {
    const ts = Date.now().toString(16);
    const rand = Math.floor(Math.random() * 0xffff).toString(16).padStart(4, '0');
    return 'cmp-' + ts + '-' + rand;
  }

  // ── Router ───────────────────────────────────────────────────────────────────

  const routes = {};
  function route(pattern, fn) { routes[pattern] = fn; }

  // ── Menu Navigation ──────────────────────────────────────────────────────────
  const hamburger = document.getElementById('nav-hamburger');
  const menuDropdown = document.getElementById('nav-menu-dropdown');

  function closeMenu() {
    menuDropdown.classList.remove('active');
  }

  hamburger.addEventListener('click', () => {
    menuDropdown.classList.toggle('active');
  });

  async function navigate() {
    const hash = location.hash.replace(/^#/, '') || '/';
    const view = document.getElementById('view');
    view.scrollTop = 0;
    view.innerHTML = '<div class="text-zinc-500 text-sm py-8 text-center">Loading…</div>';

    closeMenu();

    document.querySelectorAll('.nav-link').forEach(a => {
      a.classList.remove('bg-zinc-800', 'text-zinc-100', 'active');
      a.classList.add('text-zinc-400');
    });
    const seg = hash.split('/')[1] || 'discover';
    const active = document.querySelectorAll(`[data-nav="${seg === '' ? 'discover' : seg}"]`);
    active.forEach(el => {
      el.classList.add('bg-zinc-800', 'text-zinc-100', 'active');
      el.classList.remove('text-zinc-400');
    });

    for (const [pattern, fn] of Object.entries(routes)) {
      const re = new RegExp('^' + pattern.replace(':id', '([^/]+)') + '$');
      const m = hash.match(re);
      if (m) { try { await fn(m[1]); } catch (err) { view.innerHTML = `<p class="text-red-400">${esc(err.message)}</p>`; } return; }
    }
    view.innerHTML = '<p class="text-zinc-500">Page not found.</p>';
  }

  window.addEventListener('hashchange', navigate);

  // ── Discover ─────────────────────────────────────────────────────────────────

  route('/', async () => {
    const view = document.getElementById('view');
    const { campaigns } = await loadState();
    importUsernames(campaigns, 'creator_address', 'creator_address');

    if (!campaigns.length) {
      view.innerHTML = `<div class="empty-state text-center py-16 text-zinc-500">
        <p class="text-5xl mb-4">🌱</p>
        <p class="text-lg mb-1">No campaigns yet</p>
        <p class="text-sm text-zinc-600 mb-4">Be the first to fund an idea on-chain.</p>
        <a href="#/create" class="text-violet-400 hover:underline">Start the first one</a>
      </div>`;
      return;
    }

    const activeCampaigns = campaigns.filter(c => c.status === 'active').length;
    const totalBackers = campaigns.reduce((sum, c) => sum + (c.backer_count || 0), 0);

    view.innerHTML = `
      <div class="mb-8 pb-6 border-b border-zinc-800">
        <p class="text-zinc-400 text-sm mb-3">Fund ideas on-chain — transparent, automatic refunds.</p>
        <div class="flex flex-wrap items-center gap-4">
          <span class="text-xs text-zinc-500">${activeCampaigns} active campaign${activeCampaigns !== 1 ? 's' : ''} · ${totalBackers} backer${totalBackers !== 1 ? 's' : ''}</span>
          <a href="#/create" class="px-4 py-2 rounded-xl bg-violet-600 hover:bg-violet-500 text-sm font-semibold">Launch a Campaign →</a>
        </div>
      </div>
      <h2 class="text-sm font-medium text-zinc-500 uppercase tracking-wide mb-4">All campaigns</h2>
      <div class="campaign-grid grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        ${campaigns.map(campaignCard).join('')}
      </div>`;
  });

  function campaignCard(c) {
    const p = pct(c.total_raised, c.goal);
    const tl = timeLeft(c.deadline);
    return `<a href="#/campaign/${esc(c.id)}" class="campaign-card block bg-zinc-900 border border-zinc-800 rounded-2xl p-5 hover:border-zinc-600">
      <div class="flex items-start justify-between mb-3">
        <div class="inline-flex items-center justify-center w-12 h-12 bg-zinc-800 rounded-xl text-2xl">${esc(c.emoji) || '💡'}</div>
        ${badge(c.status)}
      </div>
      <h2 class="font-semibold mb-1 leading-snug line-clamp-2">${esc(c.title)}</h2>
      <p class="text-zinc-400 text-sm mb-1">by ${esc(getDisplayName(c.creator_address, ''))}</p>
      <p class="text-zinc-500 text-sm mb-3 line-clamp-2">${esc(c.description)}</p>
      <div class="w-full bg-zinc-800/80 rounded-full h-2.5 mb-2">
        <div class="progress-bar h-2.5 rounded-full" style="width:${p}%"></div>
      </div>
      <div class="flex justify-between text-xs text-zinc-500">
        <span>${fmt(c.total_raised)} / ${fmt(c.goal)} (${p}%)</span>
        <span>${tl}</span>
      </div>
      <div class="text-xs text-zinc-500 mt-1">${c.backer_count || 0} backer${c.backer_count == 1 ? '' : 's'}</div>
    </a>`;
  }

  // ── Campaign Detail ───────────────────────────────────────────────────────────

  route('/campaign/:id', async (id) => {
    const view = document.getElementById('view');
    const s = await loadState();
    const c = s.campaigns.find(x => x.id === id);
    if (!c) {
      view.innerHTML = '<p class="text-zinc-500">Campaign not found.</p>';
      return;
    }

    const contribs = s.contributions.filter(x => x.campaign_id === id);
    const withdrawal = s.withdrawals.find(w => w.campaign_id === id);
    const campRefunds = s.refunds.filter(r => r.campaign_id === id);
    const myAddr = window.__myAddress;
    const myContribs = myAddr ? contribs.filter(x => x.from === myAddr) : [];
    const isCreator = myAddr && c.creator_address === myAddr;

    renderDetail(c, contribs, withdrawal, campRefunds, myContribs, isCreator);
  });

  async function refreshCampaignDetail(id) {
    invalidateState();
    const view = document.getElementById('view');
    try {
      const s = await loadState(true);
      const c = s.campaigns.find(x => x.id === id);
      if (!c) return;
      const contribs = s.contributions.filter(x => x.campaign_id === id);
      const withdrawal = s.withdrawals.find(w => w.campaign_id === id);
      const campRefunds = s.refunds.filter(r => r.campaign_id === id);
      const myAddr = window.__myAddress;
      const myContribs = myAddr ? contribs.filter(x => x.from === myAddr) : [];
      const isCreator = myAddr && c.creator_address === myAddr;
      renderDetail(c, contribs, withdrawal, campRefunds, myContribs, isCreator);
    } catch (err) {
      console.error('refresh failed:', err.message);
    }
  }

  function renderDetail(c, contribs, withdrawal, campRefunds, myContribs, isCreator) {
    const view = document.getElementById('view');
    const p = pct(c.total_raised, c.goal);
    const tl = timeLeft(c.deadline);
    const canContribute = c.status === 'active';
    const walletConnected = !!window.__walletAddress;
    const explorerBase = 'https://explorer.usernodelabs.org';

    // Backers list (public view) or all contributions (creator view)
    const recentBackers = contribs
      .slice().sort((a, b) => new Date(b.ts) - new Date(a.ts))
      .slice(0, 20);

    const backersHtml = isCreator
      ? renderAllContributions(contribs, campRefunds, c.creator_address, explorerBase)
      : (recentBackers.length
          ? `<div class="space-y-2">${recentBackers.map(b =>
              `<div class="flex justify-between text-sm py-2 border-b border-zinc-800 last:border-0">
                <span class="text-zinc-300">${esc(getDisplayName(b.from, ''))}</span>
                <span class="text-zinc-400">${fmt(b.amount)}</span>
              </div>`).join('')}</div>`
          : '<p class="text-zinc-600 text-sm">No contributions yet.</p>');

    // Action panel
    let actionHtml;
    if (c.status === 'funded' && isCreator && !withdrawal) {
      actionHtml = `
        <div class="bg-zinc-900 border border-violet-600/30 rounded-xl p-5">
          <h2 class="font-semibold mb-1 text-violet-300">🎉 Goal reached!</h2>
          <p class="text-xs text-zinc-400 mb-3">You can now withdraw the collected funds to your wallet.</p>
          <button id="withdraw-btn" class="w-full py-2 bg-violet-600 hover:bg-violet-500 rounded font-medium text-sm">Withdraw ${fmt(c.total_raised)} to my wallet</button>
          <div id="withdraw-status" class="mt-2 text-xs text-zinc-500"></div>
        </div>`;
    } else if (canContribute) {
      actionHtml = `
        <div class="bg-zinc-900 border border-violet-500/30 rounded-xl p-5" id="contribute-section">
          <h2 class="font-semibold mb-1">Contribute</h2>
          ${walletConnected ? `
            <p class="text-xs text-amber-400 mb-3">⚠️ Contributions are held by the app. If the campaign is funded, the creator withdraws. If it expires unfunded, you will be automatically refunded.</p>
            <div class="flex gap-2 mb-3">
              <button class="quick-amount flex-1 py-1 text-xs border border-zinc-700 rounded hover:border-violet-500 hover:text-violet-400 transition-colors" data-amount="100">100</button>
              <button class="quick-amount flex-1 py-1 text-xs border border-zinc-700 rounded hover:border-violet-500 hover:text-violet-400 transition-colors" data-amount="500">500</button>
              <button class="quick-amount flex-1 py-1 text-xs border border-zinc-700 rounded hover:border-violet-500 hover:text-violet-400 transition-colors" data-amount="1000">1 000</button>
              <button class="quick-amount flex-1 py-1 text-xs border border-zinc-700 rounded hover:border-violet-500 hover:text-violet-400 transition-colors" data-amount="5000">5 000</button>
            </div>
            <input id="contrib-amount" type="number" min="1" step="1" placeholder="Amount" class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm mb-3 focus:outline-none focus:border-violet-500">
            <button id="contrib-btn" class="w-full py-2 bg-violet-600 hover:bg-violet-500 rounded font-medium text-sm">Send contribution</button>
            <div id="contrib-status" class="mt-2 text-xs text-zinc-500"></div>
          ` : `
            <p class="text-xs text-zinc-500 mb-3">Link a wallet to your Usernode account to contribute to this campaign.</p>
            <div id="contrib-status" class="mt-2 text-xs text-red-400"></div>
          `}
        </div>`;
    } else {
      const msgs = {
        funded: withdrawal
          ? `✅ Funds withdrawn to creator.`
          : `🎉 This campaign has been funded!`,
        withdrawn: '✅ Funds have been withdrawn to the creator.',
        expired: 'This campaign ended without reaching its goal. Refunds are processed automatically.',
        refunded: 'All contributors have been refunded.',
      };
      actionHtml = `
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 text-zinc-500 text-sm">
          ${msgs[c.status] || 'This campaign is ' + c.status + '.'}
        </div>`;
    }

    view.innerHTML = `
      <a href="#/" class="text-zinc-500 hover:text-zinc-300 text-sm mb-4 inline-block">← Back to Discover</a>
      <div class="grid lg:grid-cols-3 gap-6 mt-3">
        <div class="lg:col-span-2">
          <div class="flex items-center gap-3 mb-4">
            <span class="text-5xl">${esc(c.emoji) || '💡'}</span>
            <div>
              <h1 class="text-2xl font-bold">${esc(c.title)}</h1>
              <p class="text-zinc-500 text-sm">by ${esc(getDisplayName(c.creator_address, ''))}</p>
            </div>
          </div>
          <p class="text-zinc-300 leading-relaxed whitespace-pre-wrap mb-6">${esc(c.description)}</p>

          <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 mb-6">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
              <div class="stat-box">
                <div class="text-lg font-bold">${fmt(c.total_raised)}</div>
                <div class="text-xs text-zinc-500 mt-0.5">Raised</div>
              </div>
              <div class="stat-box">
                <div class="text-lg font-bold">${fmt(c.goal)}</div>
                <div class="text-xs text-zinc-500 mt-0.5">Goal</div>
              </div>
              <div class="stat-box">
                <div class="text-lg font-bold">${c.backer_count || 0}</div>
                <div class="text-xs text-zinc-500 mt-0.5">Backers</div>
              </div>
              <div class="stat-box">
                <div class="text-lg font-bold truncate">${tl}</div>
                <div class="text-xs text-zinc-500 mt-0.5">Time left</div>
              </div>
            </div>
            <div class="w-full bg-zinc-800 rounded-full h-3 mb-2">
              <div class="progress-bar h-3 rounded-full" style="width:${p}%"></div>
            </div>
            <div class="flex justify-between text-xs text-zinc-500">
              <span>${p}% funded</span>
              <span>${badge(c.status)}</span>
            </div>
          </div>

          <div>
            <h2 class="font-semibold mb-3">${isCreator ? 'All Contributions' : 'Recent Backers'}</h2>
            ${backersHtml}
          </div>
        </div>

        <div class="space-y-4">
          ${actionHtml}

          ${myContribs.length ? `
          <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5">
            <h3 class="text-sm font-medium mb-3 text-zinc-400">Your contributions</h3>
            <div class="space-y-2">
              ${myContribs.map(co => {
                const hasRefund = campRefunds.some(r => r.contributor === co.from);
                const st = hasRefund ? 'refunded' : 'confirmed';
                return `<div class="flex justify-between text-xs py-1">
                  <span class="text-zinc-400">${fmt(co.amount)}</span>
                  ${badge(st)}
                </div>`;
              }).join('')}
            </div>
          </div>` : ''}
        </div>
      </div>`;

    // Bind withdraw button
    const wBtn = document.getElementById('withdraw-btn');
    if (wBtn) {
      wBtn.addEventListener('click', async () => {
        const statusEl = document.getElementById('withdraw-status');
        wBtn.disabled = true;
        wBtn.textContent = 'Sending…';
        statusEl.textContent = '';
        try {
          const { txid, amount } = await api('POST', `/api/campaigns/${c.id}/withdraw`, {});
          wBtn.textContent = 'Withdrawn!';
          statusEl.textContent = `Txid: ${txid}`;
          invalidateState();
          setTimeout(() => refreshCampaignDetail(c.id), 1000);
        } catch (err) {
          wBtn.disabled = false;
          wBtn.textContent = 'Withdraw ' + fmt(c.total_raised) + ' to my wallet';
          if (isExplorerProxyError(err)) {
            // Withdrawal likely broadcast; only the confirmation read failed.
            statusEl.textContent = 'Withdrawal broadcast — confirming shortly. You don’t need to resend.';
            statusEl.className = 'mt-2 text-xs text-amber-400';
            invalidateState();
            setTimeout(() => refreshCampaignDetail(c.id), 4000);
          } else {
            statusEl.textContent = 'Error: ' + friendlyError(err);
            statusEl.className = 'mt-2 text-xs text-red-400';
          }
        }
      });
    }

    if (walletConnected) bindContribButton(c);
  }

  function renderAllContributions(contribs, campRefunds, creatorAddr, explorerBase) {
    if (!contribs.length) return '<p class="text-zinc-600 text-sm">No contributions yet.</p>';
    const sorted = contribs.slice().sort((a, b) => new Date(b.ts) - new Date(a.ts));
    return `<div class="space-y-0">${sorted.map(co => {
      const hasRefund = campRefunds.some(r => r.contributor === co.from);
      const st = hasRefund ? 'refunded' : 'confirmed';
      const txLink = co.txid && !co.txid.startsWith('demo-')
        ? `<a href="${explorerBase}/tx/${esc(co.txid)}" target="_blank" class="text-violet-400 hover:underline font-mono text-xs">${esc(co.txid.slice(0,12))}…</a>`
        : `<span class="font-mono text-xs text-zinc-600">${esc(co.txid || '—')}</span>`;
      const ts = new Date(co.ts).toLocaleString();
      return `<div class="flex flex-col py-2 border-b border-zinc-800 last:border-0">
        <div class="flex items-start justify-between mb-1">
          <span class="text-zinc-300 text-sm">${esc(getDisplayName(co.from, ''))}</span>
          <div class="flex items-center gap-2">
            <span class="text-zinc-400 text-sm">${fmt(co.amount)}</span>
            ${badge(st)}
          </div>
        </div>
        <div class="flex items-center gap-2 text-xs text-zinc-600">
          ${txLink}
          <span>${ts}</span>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  function bindContribButton(c) {
    document.querySelectorAll('.quick-amount').forEach(qb => {
      if (!qb.dataset.bound) {
        qb.dataset.bound = '1';
        qb.addEventListener('click', () => {
          const amountEl = document.getElementById('contrib-amount');
          if (amountEl) amountEl.value = qb.dataset.amount;
        });
      }
    });

    const btn = document.getElementById('contrib-btn');

      const statusEl = document.getElementById('contrib-status');
      const amount = parseInt(amountEl.value, 10);
      if (!amount || amount <= 0) { statusEl.textContent = 'Enter a valid amount.'; return; }

      btn.disabled = true;
      btn.textContent = 'Waiting for wallet…';
      statusEl.textContent = '';
      statusEl.className = 'mt-2 text-xs text-zinc-500';

      try {
        if (!window.__myAddress) {
          statusEl.textContent = 'Link a wallet to your Usernode account to contribute.';
          statusEl.className = 'mt-2 text-xs text-red-400';
          btn.disabled = false;
          btn.textContent = 'Send contribution';
          return;
        }
        await waitForBridge();
        btn.textContent = 'Broadcasting…';
        const memo = JSON.stringify({ app: 'crowdfunding', type: 'contribute', campaign: c.id });
        const txResult = await sendTransaction(window.__appPubkey, amount, memo);
        const txid = txResult && (txResult.txid || txResult.tx_id || txResult.hash);
        if (!txid) throw new Error('No txid returned from wallet');

        // Track pending locally
        pendingTxs.set(txid, {
          type: 'contribute', campaign_id: c.id, campaign_title: c.title,
          amount, ts: new Date().toISOString(),
        });

        btn.textContent = 'Sent — waiting for confirmation…';
        statusEl.textContent = 'Txid: ' + txid;
        invalidateState();

        // Poll until server picks it up
        let confirmed = false;
        for (let i = 0; i < 20 && !confirmed; i++) {
          await new Promise(r => setTimeout(r, 4000));
          try {
            const s = await loadState(true);
            if (s.contributions.some(co => co.txid === txid)) {
              confirmed = true;
              pendingTxs.delete(txid);
            }
          } catch (_) {}
        }

        await refreshCampaignDetail(c.id);
        btn.disabled = false;
        btn.textContent = 'Send contribution';
        amountEl.value = '';
        statusEl.textContent = confirmed ? 'Contribution confirmed!' : 'Sent (pending confirmation)';
      } catch (err) {
        if (isExplorerProxyError(err)) {
          // Broadcast almost certainly succeeded; only the confirmation poll
          // failed. Treat as pending and let the background refresh catch up.
          statusEl.textContent = 'Transaction broadcast — confirming shortly. You don’t need to resend.';
          statusEl.className = 'mt-2 text-xs text-amber-400';
          invalidateState();
          setTimeout(() => { loadState(true).catch(() => {}); refreshCampaignDetail(c.id); }, 4000);
        } else {
          statusEl.textContent = 'Failed — ' + friendlyError(err);
          statusEl.className = 'mt-2 text-xs text-red-400';
        }
        btn.disabled = false;
        btn.textContent = 'Send contribution';

    });

        }).catch(() => {});
      });
    }
  });

  // ── Wallet chip helpers ───────────────────────────────────────────────────────

  let dropdownListenersBound = false;

  function syncWalletChip(addr) {
    const truncated = addr.slice(0, 6) + '…' + addr.slice(-4);
    const container = document.getElementById('wallet-chip-container');
    const wdUsername = document.getElementById('wd-username');
    const wdAddress = document.getElementById('wd-address');

    wdAddress.textContent = addr;
    wdUsername.textContent = truncated;
    container.classList.remove('hidden');

    if (window.UsernodeUsernames) {
      UsernodeUsernames.getUsername(addr).then(un => {
        if (un) { wdUsername.textContent = un; }
      }).catch(() => {});
    }

    if (!dropdownListenersBound) {
      dropdownListenersBound = true;
      const dropdown = document.getElementById('wallet-dropdown');
      const profileIconBtn = document.getElementById('profile-icon-btn');

      profileIconBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('hidden');
      });

      document.getElementById('wd-copy-btn').addEventListener('click', () => {
        const btn = document.getElementById('wd-copy-btn');
        navigator.clipboard.writeText(addr).then(() => {
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = 'Copy address'; }, 2000);
        }).catch(() => {});
      });

      document.getElementById('wd-profile-link').addEventListener('click', () => {
        dropdown.classList.add('hidden');
      });

      document.addEventListener('mousedown', (e) => {
        const container = document.getElementById('wallet-chip-container');
        const profileBtn = document.getElementById('profile-icon-btn');
        if (!container.contains(e.target) && !profileBtn.contains(e.target)) {
          dropdown.classList.add('hidden');
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') dropdown.classList.add('hidden');
      });
    }
  }

  const connectWalletBtn = document.getElementById('connect-wallet-btn');
  const profileIconBtn = document.getElementById('profile-icon-btn');

  function updateWalletUI(isConnected) {
    if (isConnected) {
      connectWalletBtn.classList.add('hidden');
      profileIconBtn.classList.remove('hidden');
    } else {
      connectWalletBtn.classList.remove('hidden');
      profileIconBtn.classList.add('hidden');
    }
  }

  connectWalletBtn.addEventListener('click', () => {
    // No wallet linked to the Usernode account — show informational tooltip
    const existingTooltip = document.getElementById('connect-wallet-tooltip');
    if (existingTooltip) { existingTooltip.remove(); return; }

    const tooltip = document.createElement('div');
    tooltip.id = 'connect-wallet-tooltip';
    tooltip.className = 'absolute right-0 top-full mt-2 w-64 bg-zinc-900 border border-zinc-700 rounded-lg shadow-xl p-3 text-xs text-zinc-300 z-50';
    tooltip.textContent = 'Link a wallet to your Usernode account to participate in campaigns.';

    connectWalletBtn.parentElement.style.position = 'relative';
    connectWalletBtn.parentElement.appendChild(tooltip);

    setTimeout(() => { if (tooltip.parentElement) tooltip.remove(); }, 4000);
    document.addEventListener('click', function dismissCwTooltip(e) {
      if (!connectWalletBtn.contains(e.target)) {
        if (tooltip.parentElement) tooltip.remove();
        document.removeEventListener('click', dismissCwTooltip);
      }
    });
  });

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('cf:theme', isDark ? 'dark' : 'light');
  });

  // Close menu on outside click
  document.addEventListener('mousedown', (e) => {
    const isClickingMenu = menuDropdown.contains(e.target);
    const isClickingHamburger = hamburger.contains(e.target);
    if (!isClickingMenu && !isClickingHamburger) {
      closeMenu();
    }
  });

  // Close menu on Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeMenu();
  });

  // ── Init ─────────────────────────────────────────────────────────────────────

  // Start /api/me, bridge, and /api/env all in parallel.
  // Use JWT identity immediately when available — no waiting for bridge.
  const meProm = api('GET', '/api/me');
  const bridgeProm = waitForBridge();
  const envProm = api('GET', '/api/env').then(({ staging, chain_id, app_pubkey }) => {
    if (staging) document.getElementById('staging-pill').classList.remove('hidden');
    window.__appPubkey = app_pubkey || '';
    return chain_id || '1';
  }).catch(() => '1');

  meProm.then(user => {
    window.__currentUser = user;
    const pubkey = user.usernode_pubkey || user.address || null;
    if (pubkey) {
      window.__walletAddress = pubkey;
      window.__myAddress = pubkey;
      syncWalletChip(pubkey);
      updateWalletUI(true);
    } else {
      updateWalletUI(false);
    }
  }).catch(() => {
    updateWalletUI(false);
  });

  // When bridge resolves, wire up transaction globals and confirm/update active wallet.
  Promise.all([bridgeProm, envProm]).then(([u, chainId]) => {
    window.usernode = u;
    if (!window.getNodeAddress) window.getNodeAddress = (...a) => u.getNodeAddress(...a);
    if (!window.sendTransaction) window.sendTransaction = (...a) => u.sendTransaction(...a);

    u.transactionsBaseUrl = '/explorer-api/' + chainId;

    if (window.UsernodeUsernames) UsernodeUsernames.init().catch(() => {});

    return u.getNodeAddress();
  }).then(bridgeAddr => {
    if (!bridgeAddr) return;
    // If bridge returns a different address than JWT (e.g. user switched wallets), trust bridge
    if (bridgeAddr !== window.__walletAddress) {
      window.__walletAddress = bridgeAddr;
      window.__myAddress = bridgeAddr;
      syncWalletChip(bridgeAddr);
      updateWalletUI(true);
    }
  }).catch(() => {
    // Bridge failed — wallet state is already set from JWT, so no UI change needed
  });

  navigate();
})();
</script>
</body>
</html>
